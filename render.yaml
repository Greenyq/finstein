databases:
  - name: finbot-db
    plan: free
    databaseName: finbot
    user: finbot

services:
  - type: web
    name: finbot
    runtime: node
    plan: free
    buildCommand: npm run build:render
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finbot-db
          property: connectionString
      - key: WEBHOOK_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
